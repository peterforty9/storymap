<!DOCTYPE html>

<html>
<head>

    <title>Storymap</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" type="text/css" href="newcss.css">
    <link rel="stylesheet" type="text/css" href="defaulttheme.css">
    <link rel="stylesheet" type="text/css" href="road.css">
    <link id="columns" rel="stylesheet" type="text/css" href="singlecolumn.css">
    <script src="https://use.fontawesome.com/38fbd21692.js" defer></script>

    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

</head>

<body>
    <script type="text/javascript" src="js/jquery-3.3.1.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>
    <script type="text/javascript" src="js/group-management.js"></script>
    <script type="text/javascript" src="js/newjavascript.js"></script>
    <div class="page">
        <div id='menubar'>
            <div id='boardTitle'>
                <label id='boardname' class='title' style="overflow:hidden"></label>
            </div>
            <div id="menuright">
                <div class="togglearea">
                    <label class='blockmenu-item' id='toggleBoardMenu'><i class='fa fa-bars'></i></label>
                </div>
            </div>
        </div>
        <div id="board-menu-overlay"></div>
        <div id="boardMenu">
            <label class='container' id="new"><i class="fa fa-table fa-fw" aria-hidden="true"></i><span class="menu-label">New</span></label>
            <label class='container' id="loadarray"><i class='fa fa-upload fa-fw'></i><span class="menu-label">Load</span></label>
            <label class='container' id="savearray"><i class='fa fa-save fa-fw'></i><span class="menu-label">Save</span></label>
            <label class='container' id='boardSettingsbutton'><i class='fa fa-cog fa-fw'></i><span class="menu-label">Settings</span></label>
            <label class='container' id='deleteboard'><i class='fa fa-trash fa-fw'></i><span class="menu-label">Delete</span></label>
            <label class='container' id='colwidth'><i class="fa fa-exchange fa-fw"></i><span class="menu-label">Column width</span></label>
            <label class='container' id='quickEdit'><i class='fa fa-pencil fa-fw'></i><span class="menu-label">Quick edit</span></label>
        </div>
        <div id='board'></div>
        <div id='infobox'>
            <div id='infobox-title'>
                <textarea id='blockname' class='title' maxlength='50' style="overflow:hidden"></textarea>
                <label class='blockmenu-item' id='toggleBlockmenu'><i class='fa fa-bars'></i></label>
                <label class='blockmenu-item' id='toggledetails'><i class='fa fa-angle-double-up'></i></label>
            </div>
            <div id='infobox-navbar'>
                <div id="blockmenu">
                    <label class='blockmenu-item' id='addblock'><i class='fa fa-plus-square addGroup'></i></label>
                    <label class='blockmenu-item' id='moveleft'><i class="fa fa-caret-square-o-left"></i></label>
                    <label class='blockmenu-item' id='moveup' title="Move up"><i class="fa fa-caret-square-o-up"></i></label>
                    <label class='blockmenu-item' id='movedown' title="Move down"><i class="fa fa-caret-square-o-down"></i></label>
                    <label class='blockmenu-item' id='moveright'><i class="fa fa-caret-square-o-right"></i></label>
                </div>
                <div id="manageblock">
                    <label class='blockmenu-item' id='deleteblock'><i class='fa fa-trash-o'></i></label>
                </div>

            </div>
            <div id="subsets">
                <form>
                    <fieldset id="subsetsfieldset">
                        <!--  <label for="subset1">Type</label>
                    <select id="subset1"></select>
                    <label for="subset0">State</label>
                    <select id="subset0"></select> -->
                    </fieldset>
                </form>
            </div>
            <div id='blockdetails' contenteditable='true'></div>

        </div>
    </div>

    <!-- Custom modal -->
    <div id="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <span id="modal-title"></span>
                <button id="modal-close" aria-label="Close">&#x2715;</button>
            </div>
            <div class="modal-body">
                <div id="modal-section-deleteblock" class="modal-section">
                    <p>Are you sure you want to delete this block?</p>
                </div>
                <div id="modal-section-deleteboard" class="modal-section">
                    <p>Are you sure you want to delete this board?</p>
                </div>
                <div id="modal-section-newboard" class="modal-section">
                    <form id="newboard-form">
                        <fieldset>
                            <label for="filename">Filename</label>
                            <input type="text" name="filename" id="filename" value="" autocomplete="off">
                        </fieldset>
                        <fieldset>
                            <label for="boardType">Board type</label>
                            <select id="boardType"></select>
                        </fieldset>
                        <fieldset>
                            <label for="settingsBoardNew">Settings board</label>
                            <select id="settingsBoardNew"></select>
                        </fieldset>
                    </form>
                </div>
                <div id="modal-section-loadboard" class="modal-section">
                    <form>
                        <fieldset>
                            <label for="loadfilename">Filename</label>
                            <select id="loadfilename"></select>
                        </fieldset>
                    </form>
                </div>
                <div id="modal-section-settings" class="modal-section">
                    <form>
                        <fieldset>
                            <label for="settingsBoard">Settings board</label>
                            <select id="settingsBoard"></select>
                        </fieldset>
                    </form>
                </div>
                <div id="modal-section-error" class="modal-section">
                    <p id="modal-error-text"></p>
                </div>
            </div>
            <div class="modal-footer">
                <button id="modal-cancel">Cancel</button>
                <button id="modal-primary">Continue</button>
            </div>
        </div>
    </div>

</body>
</html>
